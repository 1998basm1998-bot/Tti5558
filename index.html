<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar closed" id="sidebar">
            <div class="sidebar-top-header">
                <i class="fas fa-robot" style="font-size: 20px;"></i>
                <button id="close-sidebar" class="icon-btn" style="color: var(--text-main);"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="sidebar-menu-list">
                <button id="new-chat-btn" class="sidebar-menu-btn">
                    <i class="far fa-edit"></i> دردشة جديدة
                </button>
                <div class="sidebar-menu-btn search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-chats" placeholder="البحث في الدردشات...">
                </div>
                <button id="images-btn" class="sidebar-menu-btn">
                    <i class="far fa-image"></i> الصور
                </button>
            </div>

            <div class="chat-history" id="chat-history">
                </div>
            
            <div class="user-account" id="user-account-btn">
                <img src="https://ui-avatars.com/api/?name=User&background=random" alt="User" class="avatar">
                <span class="username">المستخدم الحالي</span>
                <i class="fas fa-ellipsis-h"></i>
            </div>
        </aside>

        <main class="main-content">
            <header style="flex-direction: row-reverse; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; height: 60px; background-color: var(--bg-main);">
                <div class="header-left-group" style="display: flex; align-items: center; gap: 10px; flex-direction: row-reverse;">
                    <button id="toggle-sidebar" class="icon-btn" style="color: #000;"><i class="fas fa-bars" style="font-size: 20px;"></i></button>
                    <div class="app-title" style="font-weight: 700; font-size: 18px; color: #000; display: flex; align-items: center;">ChatGPT <i class="fas fa-chevron-down" style="font-size: 12px; font-weight: normal; margin-right: 5px; color: #666;"></i></div>
                    <button class="upgrade-btn" style="background-color: #f3e8ff; color: #7e22ce; border: none; padding: 6px 14px; border-radius: 20px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px;"><i class="fas fa-sparkles"></i> اشترك في Plus</button>
                </div>
                <div class="header-right-group">
                    <button id="new-chat-btn-top" class="icon-btn" style="color: #000;"><i class="far fa-circle" style="border: 2px dashed #999; border-radius: 50%; width: 22px; height: 22px; display: inline-block; color: transparent;"></i></button>
                </div>
            </header>

            <div class="chat-container" id="chat-container" style="display: none;">
                </div>

            <div class="welcome-screen" id="welcome-screen">
                <h1 id="welcome-text" style="font-size: 28px; font-weight: 700; color: #000;">ماذا يجول بخاطرك اليوم؟</h1>
            </div>

            <div class="input-area">
                <div class="image-preview-container" id="image-preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Preview">
                    <button id="remove-image"><i class="fas fa-times"></i></button>
                </div>
                <div class="input-wrapper-pill" style="display: flex; align-items: center; background-color: #f4f4f4; border: 1px solid #e5e5e5; border-radius: 35px; padding: 8px 15px; gap: 10px; flex-direction: row-reverse; box-shadow: none;">
                    <label for="image-upload" class="icon-btn plus-btn" title="رفع" style="color: #666; font-size: 22px; cursor: pointer; padding: 5px;"><i class="fas fa-plus"></i></label>
                    
                    <textarea id="message-input" placeholder="اسأل عن أي شيء" rows="1" style="flex: 1; background: transparent; border: none; outline: none; font-size: 16px; text-align: right; resize: none; overflow: hidden; padding-top: 8px; color: #000;"></textarea>
                    
                    <button class="icon-btn mic-btn" style="color: #666; font-size: 18px; padding: 5px;"><i class="fas fa-microphone"></i></button>
                    <button id="dynamic-send-btn" class="dynamic-btn voice-mode" style="background-color: #000; color: #fff; width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                        <i class="fas fa-align-center" style="transform: rotate(90deg);"></i>
                    </button>
                    <input type="file" id="image-upload" accept="image/*" style="display: none;">
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <span class="close-modal"><i class="fas fa-times"></i></span>
            <h2>الإعدادات</h2>
            <div class="settings-group">
                <label>مفتاح API (اختياري)</label>
                <input type="password" id="api-key-input" placeholder="sk-...">
            </div>
            <button id="theme-toggle" class="primary-btn" style="margin-top: 15px;"><i class="fas fa-moon"></i> تبديل المظهر</button>
            <button id="clear-data-btn" class="danger-btn"><i class="fas fa-trash"></i> مسح جميع البيانات</button>
            <button id="save-settings-btn" class="primary-btn" style="margin-top: 15px; width: 100%;">حفظ الإعدادات</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
