<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <div class="app-container">
        <aside class="sidebar closed" id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="primary-btn"><i class="fas fa-plus"></i> دردشة جديدة</button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-chats" placeholder="البحث في الدردشات...">
            </div>
            <div class="chat-history" id="chat-history">
                </div>
            
            <div class="user-account" id="user-account-btn">
                <img src="https://ui-avatars.com/api/?name=User&background=random" alt="User" class="avatar">
                <span class="username">المستخدم الحالي</span>
                <i class="fas fa-ellipsis-h"></i>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <div class="header-right">
                    <button id="toggle-sidebar" class="icon-btn"><i class="fas fa-bars"></i></button>
                </div>
                <div class="header-center">
                    <div class="app-title-pill">ChatGPT</div>
                </div>
                <div class="header-left">
                    <button class="icon-btn"><i class="fas fa-user-plus"></i></button>
                    <button id="new-chat-btn-top" class="icon-btn"><i class="far fa-edit"></i></button>
                </div>
            </header>

            <div class="chat-container" id="chat-container" style="display: none;">
                </div>

            <div class="welcome-screen" id="welcome-screen">
                <h1 id="welcome-text">كيف يمكنني المساعدة؟</h1>
                <div class="suggestions-grid">
                    <button class="suggestion-pill" onclick="fillInput('إنشاء صورة تعبر عن: ')">
                        <span>إنشاء صورة</span>
                        <i class="fas fa-image icon-green"></i>
                    </button>
                    <button class="suggestion-pill" onclick="fillInput('لخص هذا النص: ')">
                        <span>لخص النص</span>
                        <i class="fas fa-file-alt icon-orange"></i>
                    </button>
                    <button class="suggestion-pill" onclick="fillInput('تحليل البيانات لـ: ')">
                        <span>تحليل البيانات</span>
                        <i class="fas fa-chart-bar icon-blue"></i>
                    </button>
                    <button class="suggestion-pill" onclick="fillInput('ضع خطة عمل لـ: ')">
                        <span>ضع خطة</span>
                        <i class="far fa-lightbulb icon-yellow"></i>
                    </button>
                </div>
            </div>

            <div class="input-area">
                <div class="image-preview-container" id="image-preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Preview">
                    <button id="remove-image"><i class="fas fa-times"></i></button>
                </div>
                <div class="input-wrapper-pill">
                    <button id="dynamic-send-btn" class="dynamic-btn voice-mode">
                        <i class="fas fa-water"></i> </button>
                    <button class="icon-btn mic-btn"><i class="fas fa-microphone"></i></button>
                    
                    <textarea id="message-input" placeholder="اطرح سؤالك على Cha..." rows="1"></textarea>
                    
                    <input type="file" id="image-upload" accept="image/*" style="display: none;">
                    <label for="image-upload" class="icon-btn plus-btn" title="رفع صورة"><i class="fas fa-plus"></i></label>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <span class="close-modal"><i class="fas fa-times"></i></span>
            <h2>الإعدادات</h2>
            <div class="settings-group">
                <label>مفتاح API (اختياري)</label>
                <input type="password" id="api-key-input" placeholder="sk-...">
            </div>
            <button id="theme-toggle" class="primary-btn" style="margin-top: 15px;"><i class="fas fa-moon"></i> تبديل المظهر</button>
            <button id="clear-data-btn" class="danger-btn"><i class="fas fa-trash"></i> مسح جميع البيانات</button>
            <button id="save-settings-btn" class="primary-btn" style="margin-top: 15px; width: 100%;">حفظ الإعدادات</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
